<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    /* Write your code here */
    /* Internal Style Sheet - to make it easier for seeing html while coding css. */
    .red-circle {
      background-color: red;
      width: 200px;
      height: 200px;
      /* ABOVE: without a width and a height, it isn't visible. */
      /* BELOW: border-radius curves edges of box. And if you use 50%, it creates a circle. */
      border-radius: 50%;
      position: absolute;
      left: 250px;
      top: 150px;
      z-index: 2;
    }

    .blue-box {
      background-color: blue;
      width: 500px;
      height: 300px;
      position: relative;
      left: 200px;
      top: 200px;
      z-index: 1;
    }
  </style>
</head>

<body>
  <div class="blue-box">
    <div class="red-circle">
    </div>
  </div>

</body>

</html>
