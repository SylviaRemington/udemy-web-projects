<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>

  <style>

    /* Write your CSS Code here */
    /* Attempt #2 */

    /* RED PART OF FLAG */
    /* .flag is the whole flag - The main div that encompasses everything */
    /* Did this one correctly. */
    .flag {
        background-color: rgb(206, 17, 38);
        width: 900px;
        height: 600px;
        position: relative;
    }

    /* BLUE PART OF FLAG */
    /* .flag > div is the middle part that encompasses also the 'of Laos part' */
    /* Did this one correctly. */
    .flag > div {
        background-color: rgb(0, 40, 104);
        width: 900px;
        /* Can also do width: 100% because it's 100% of its parent. */
        height: 300px;
        position: absolute;
        top: 150px;
    }

    /* WHITE CIRCLE */
    /* You can do .flag div > p and you can do .flag > div > div */
    .flag > div > div {
        background-color: white;
        /* This below creates a square. */
        width: 200px;
        height: 200px;
        /* This below creates the circle */
        border-radius: 50%; 
        /* BELOW PUTTING WHITE CIRCLE RELATIVE TO ITS PARENT - THE BLUE CIRCLE */
        position: relative;
        top: 50px;
        left: 350px;
        /* 350px because total width is 900, width of circle is 200px and difference on each side is 350px on each side. */
    }

    /* P TEXT FOR ALL Ps */
    p {
        margin: 0;
        font-size: 5rem;
        text-align: center;
        color: white;
    }

    /* 'OF LAOS' PART */ 
    body > div > div > div > p {
        /* could also do .flag div div p above and have the same result - see solution code for addtl options */
        color: black;
    }

    /* If I wanted to make the verbiage 'The Flag' centered, I could do this too. */
    body > div > p {
        position: relative;
        top: 30px;
    }

  </style>

</head>

<!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors 
and CSS specificity instead.
Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
Hint 2: You can use CSS inspection to get the colors from
https://appbrewery.github.io/flag-of-laos/
-->

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
