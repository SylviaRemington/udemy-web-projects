<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>

  <style>

    /* Write your CSS Code here */
    /* Attempt #2 */

    /* .flag is the whole flag - The main div that encompasses everything */
    .flag {
        background-color: rgb(206, 17, 38);
        width: 900px;
        height: 600px;
        position: relative;
        color: white;
        font-size:  5rem;
    }

    /* .flag > div is the middle part that encompasses also the 'of Laos part' */
    .flag > div {
        background-color: rgb(0, 40, 104);
        width: 900px;
        /* Can also do width: 100% because it's 100% of its parent. */
        height: 300px;
        position: absolute;
        top: 150px;
    }

    /* This part is the white circle part */
    /* You can do .flag div > p and you can do .flag div > div */
    .flag div > p {
        background-color: white;
        /* This below creates a square. */
        width: 200px;
        height: 200px;
        /* This below creates the circle */
        border-radius: 50%; 
        /* position: absolute;
        top: 225px; ohhhh already 200px down... so just need to add the 25 px? Or actually that's the height & width of circle.*/
        position: absolute;
        top: 30px;
        left: 350px;
        color: black;
    }

    p {
        text-align: center;
        position: relative;
        top: 75px;
    }

    /* redundant */
    /* .flag div p {
        color: black;
    } */

  </style>

</head>

<!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors 
and CSS specificity instead.
Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
Hint 2: You can use CSS inspection to get the colors from
https://appbrewery.github.io/flag-of-laos/
-->

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
